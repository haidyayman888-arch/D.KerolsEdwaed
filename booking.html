<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Booking - Dental Clinic</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
*{
  box-sizing:border-box;
  font-family:'Cairo';
}

body{
  margin:0;
  background:linear-gradient(90deg,#0f5c8c,#6d8bdd);
  color:white;
}

header{
  background:#0a4970;
  padding:15px;
  text-align:center;
}
* {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Cairo', sans-serif;
    }

    body {
      background: linear-gradient(90deg, #0f5c8c, #6d8bdd);
      color: white;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(90deg, #0a4970, #0b329d);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo img {
      width: 60px;
    }

    nav {
      display: flex;
      gap: 10px;
    }

    nav a {
      background: #1e88c7;
      padding: 8px 15px;
      border-radius: 8px;
      text-decoration: none;
      color: white;
      font-size: 14px;
    }
    footer {
      background: black;
      color: white;
      text-align: center;
      padding: 70px;
      font-size: 14px;
    }
.container{
  padding:20px;
}

.box{
  background:white;
  color:black;
  padding:20px;
  border-radius:12px;
}

input,button{
  padding:10px;
  margin:10px 0;
  width:100%;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  background:#0f5c8c;
  color:white;
  border:none;
  cursor:pointer;
}

.slot{
  display:inline-block;
  padding:10px;
  margin:5px;
  border-radius:8px;
  cursor:pointer;
}

.free{background:#d4f8d4;}
.booked{background:#ffb3b3; cursor:not-allowed;}


</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="images/logo.png" alt="logo">
    <div>
      <h2>Dr . Kerolus Edward</h2>
      <p>Dental Clinic</p>
    </div>
  </div>

  <nav>
    <a href="home.HTML">Home</a>
    <a href="notfication.html">Notification</a>
    <a href="booking.html">Booking</a>
    <a href="tracking.html">Tracking</a>
    <a href="signup.html">SignUp</a>
  </nav>
</header>

<div class="container">
  <div class="box">

    <label>اختار اليوم</label>
    <input type="date" id="date">

    <input type="text" id="name" placeholder="اكتب اسمك" style="display:none;">

    <button onclick="loadSlots()">عرض المواعيد</button>

    <div id="slots"></div>

  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function generateSlots(){
  let slots=[];
  for(let h=9;h<=21;h++){
    slots.push(`${h}:00`);
    slots.push(`${h}:30`);
  }
  return slots;
}

function loadSlots(){

  let date = document.getElementById("date").value;
  if(!date){
    alert("اختاري يوم");
    return;
  }

  document.getElementById("name").style.display = "block";

  let slots = generateSlots();
  let container = document.getElementById("slots");
  container.innerHTML = "";

  db.collection("appointments")
  .where("date","==",date)
  .onSnapshot(snapshot=>{

    let booked = [];
    let dataMap = {};

    snapshot.forEach(doc=>{
      let d = doc.data();
      booked.push(d.time);
      dataMap[d.time] = d;
    });

    container.innerHTML = "";

    slots.forEach(time=>{
      let div = document.createElement("div");
      div.className = "slot";

      if(booked.includes(time)){
        div.classList.add("booked");
        div.innerText = time + " محجوز - " + dataMap[time].name;
      } else {
        div.classList.add("free");
        div.innerText = time + " فاضي";

        div.onclick = ()=> book(date,time);
      }

      container.appendChild(div);
    });

  });
}

function book(date,time){

  let name = document.getElementById("name").value;

  if(!name){
    alert("من فضلك اكتب اسمك");
    return;
  }

  db.collection("appointments").add({
    date:date,
    time:time,
    name:name,
    datetime: date+" "+time,
    status:"booked"
  });

  alert("تم الحجز بنجاح");
}
</script>
<footer>
    <p>© 2026 Dr. Kerolus Edward - Dental Clinic. All Rights Reserved</p>
  </footer>
</body>
</html>
