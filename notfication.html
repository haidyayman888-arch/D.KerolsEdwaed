    <div class="layout">

          <div id="notifications"></div>

      </div>
<!-- Firebase -->
<script type="module">

  // 🔥 1. حطي بيانات مشروعك هنا
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
  apiKey: "AIzaSyCn1VXJpWYlKohbwCkRMRi_qkBJUWDWt5g",
  authDomain: "dkerolusedward.firebaseapp.com",
  projectId: "dkerolusedward",
  storageBucket: "dkerolusedward.firebasestorage.app",
  messagingSenderId: "276983681544",
  appId: "1:276983681544:web:cd1f76ae85c8407126f7bd",
  measurementId: "G-JKSBQBH63N"
};

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // 🔥 2. جلب البيانات
  const container = document.getElementById("notifications");

  async function loadNotifications() {
    const querySnapshot = await getDocs(collection(db, "notifications"));

    querySnapshot.forEach((doc) => {
      const data = doc.data();

      const div = document.createElement("div");
      div.classList.add("notification");

      if (!data.read) {
        div.classList.add("unread");
      }

      div.innerHTML = `
        <div>
          ${data.title}
          <br>
          <small>${data.time}</small>
        </div>
      `;

      container.appendChild(div);
    });
  }

  loadNotifications();

</script>
